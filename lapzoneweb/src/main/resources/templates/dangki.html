<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/css.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Đăng ký tài khoản - LAPZONE</title>
    <style>
        :root {
            --primary-blue: #4dabf7;
            --dark-blue: #1971c2;
            --light-blue: #e7f5ff;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-main: #212529;
            --text-muted: #868e96;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f0f8ff 0%, #d0e7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .register-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            margin: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-container h2 {
            margin: 0 0 10px 0;
            color: var(--dark-blue);
            font-size: 28px;
            font-weight: 700;
        }

        .register-container p.subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-blue);
            font-size: 16px;
        }

        .register-container input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 1.5px solid #dee2e6;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 15px;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.9);
        }

        .register-container input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(77, 171, 247, 0.15);
            background: #fff;
        }

        .register-container button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 15px;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(25, 113, 194, 0.3);
        }

        .register-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(25, 113, 194, 0.4);
            filter: brightness(1.1);
        }

        .register-container button:active {
            transform: translateY(0);
        }

        .error {
            color: #e03131;
            font-size: 13px;
            margin-top: 15px;
            background-color: #fff5f5;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #e03131;
            text-align: left;
        }

        .login-link {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-main);
        }

        .login-link a {
            color: var(--dark-blue);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }

        .login-link a:hover {
            color: var(--primary-blue);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
        }

        .home-link i { margin-right: 8px; }

        .home-link:hover {
            color: var(--dark-blue);
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Đăng Ký</h2>
        <p class="subtitle">Tham gia cộng đồng LAPZONE ngay hôm nay</p>

        <form th:action="@{/dangki}" method="post" onsubmit="return validatePassword()">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="fullName" placeholder="Họ và Tên đầy đủ" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email đăng nhập" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" name="phone" placeholder="Số điện thoại" required>
            </div>

            <div class="input-group">
                <i class="fas fa-map-marker-alt"></i>
                <input type="text" name="address" placeholder="Địa chỉ của bạn" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
            </div>

            <div class="input-group">
                <i class="fas fa-shield-alt"></i>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
            </div>
            
            <button type="submit">Tạo tài khoản</button>

            <div th:if="${error != null}" class="error" th:text="${error}"></div>
            <div id="js-error" class="error" style="display: none;"></div>
        </form>

        <div class="login-link">
            Đã có tài khoản? <a th:href="@{/dangnhap}">Đăng nhập ngay</a>
        </div>
        
        <a th:href="@{/}" class="home-link"><i class="fas fa-chevron-left"></i> Quay lại trang chủ</a>
    </div>

    <script>
        function validatePassword() {
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirmPassword").value;
            var errorDiv = document.getElementById("js-error");
            
            if (password !== confirmPassword) {
                errorDiv.style.display = "block";
                errorDiv.innerHTML = "Mật khẩu xác nhận không khớp!";
                return false; // Ngăn không cho form submit
            }
            errorDiv.style.display = "none";
            return true; // Cho phép form submit
        }
    </script>
</body>
</html>
