<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Đăng ký tài khoản - LAPZONE</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-secondary));
        }
        .register-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-glass);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-neon);
            backdrop-filter: blur(10px);
        }
        .register-card h2 { text-align: center; color: var(--text-primary); margin-bottom: 30px; font-size: 2rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-weight: 500; }
        .form-group input { 
            width: 100%; 
            padding: 12px 16px; 
            background: rgba(0,0,0,0.05); 
            border: 1px solid var(--border-glass); 
            border-radius: var(--radius-md); 
            color: var(--text-primary); 
            transition: var(--transition-normal); 
        }
        .form-group input:focus { border-color: var(--accent-neon); outline: none; box-shadow: var(--glow-primary); }
        .btn-register { width: 100%; margin-top: 10px; }
        .extra-links { text-align: center; margin-top: 24px; color: var(--text-secondary); }
        .extra-links a { color: var(--accent-neon); font-weight: 600; }
        .extra-links a:hover { text-decoration: underline; }
        
        .alert { padding: 12px; border-radius: var(--radius-md); margin-bottom: 20px; }
        .alert-error { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.2); }
        .alert-success { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div class="register-card">
        <div style="text-align: center; margin-bottom: 20px;">
            <a th:href="@{/}"><img th:src="@{/assets/logo-lapzone.jpg}" alt="Lapzone" style="height: 50px; margin: 0 auto;"></a>
        </div>
        <h2>TẠO TÀI KHOẢN</h2>
        
        <div th:if="${error != null}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        
        <div th:if="${success != null}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/dangki}" method="post">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" name="name" placeholder="VD: Nguyễn Văn A" required>
            </div>
            
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" name="phone" placeholder="VD: 0912345678" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="VD: email@example.com" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            
            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
            </div>

            <button type="submit" class="btn-primary btn-register">ĐĂNG KÝ NGAY</button>
        </form>

        <div class="extra-links">
            Đã có tài khoản? <a th:href="@{/dangnhap}">Đăng nhập ngay</a><br><br>
            <a th:href="@{/}" style="color: var(--text-secondary); font-weight: normal;"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
        </div>
    </div>

</body>
</html>
