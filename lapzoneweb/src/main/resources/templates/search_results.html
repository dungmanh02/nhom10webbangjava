<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="'Kết Quả Tìm Kiếm: ' + ${keyword}">Kết Quả Tìm Kiếm</title>
    <!-- Tái sử dụng CSS cũ của bạn -->
    <link rel="stylesheet" th:href="@{/css/css.css}">
    <link rel="stylesheet" th:href="@{/css/product.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Thêm chút CSS cho cái Layout Bộ Lọc */
        .search-container {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
        }
        .filter-sidebar {
            width: 250px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: fit-content;
        }
        .filter-sidebar h3 { margin-top: 0; color: #034b94; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; margin-bottom: 8px; font-weight: bold;}
        .filter-group select, .filter-group input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px;}
        .btn-filter { width: 100%; background: #034b94; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;}
        .search-results-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;}
    </style>
</head>
<body>

    <!-- Chèn Header dùng chung (Đảm bảo form tìm kiếm trên Header action="/search" và method="get") -->
    <div th:replace="~{fragments/header :: header_lapzone}"></div>

    <div class="content" style="text-align: center; margin-top: 20px;">
        <h1 style="color: #034b94;" th:text="'Kết Quả Tìm Kiếm Cho: ' + ${keyword != '' ? keyword : 'Tất cả sản phẩm'}">Kết Quả</h1>
    </div>

    <div class="search-container">
        <!-- CỘT BÊN TRÁI: BỘ LỌC (FILTER) -->
        <div class="filter-sidebar">
            <h3><i class="fa fa-filter"></i> Lọc Sản Phẩm</h3>
          <form th:action="@{/search}" method="get">
                <!-- Giữ lại từ khóa tìm kiếm (ẩn đi) -->
                <input type="hidden" name="query" th:value="${keyword}">
                
                <!-- Khối chọn Hãng (Chỉ hiện ra khi bấm Xem tất cả / Từ khóa rỗng) -->
                <div class="filter-group" th:if="${keyword == null or keyword.trim() == ''}">
                    <label>Hãng sản xuất:</label>
                    <select name="categoryId">
                        <option value="">-- Tất cả các hãng --</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.name}"
                                th:selected="${cat.id == selectedCategoryId}"></option>
                    </select>
                </div>

                <!-- Lọc Giá -->
                <div class="filter-group">
                    <label>Mức giá (VNĐ):</label>
                    <input type="number" name="minPrice" placeholder="Giá từ..." th:value="${selectedMinPrice}">
                    <input type="number" name="maxPrice" placeholder="Đến giá..." th:value="${selectedMaxPrice}">
                </div>

                <!-- Lọc CPU -->
                <div class="filter-group">
                    <label>Vi xử lý (CPU):</label>
                    <select name="cpu">
                        <option value="">-- Tất cả CPU --</option>
                        <option value="Core i5" th:selected="${selectedCpu == 'Core i5'}">Intel Core i5</option>
                        <option value="Core i7" th:selected="${selectedCpu == 'Core i7'}">Intel Core i7</option>
                        <option value="Ryzen 5" th:selected="${selectedCpu == 'Ryzen 5'}">AMD Ryzen 5</option>
                        <option value="Ryzen 7" th:selected="${selectedCpu == 'Ryzen 7'}">AMD Ryzen 7</option>
                        <option value="Apple M" th:selected="${selectedCpu == 'Apple M'}">Apple M-Series</option>
                    </select>
                </div>

                <!-- Lọc GPU siêu chi tiết -->
                <div class="filter-group">
                    <label>Card đồ họa (GPU):</label>
                    <select name="gpu">
                        <option value="">-- Tất cả GPU --</option>
                        <option value="RTX 3050" th:selected="${selectedGpu == 'RTX 3050'}">NVIDIA RTX 3050</option>
                        <option value="RTX 4050" th:selected="${selectedGpu == 'RTX 4050'}">NVIDIA RTX 4050</option>
                        <option value="RTX 4060" th:selected="${selectedGpu == 'RTX 4060'}">NVIDIA RTX 4060</option>
                        <option value="RTX 4070" th:selected="${selectedGpu == 'RTX 4070'}">NVIDIA RTX 4070</option>
                        <option value="Intel Iris" th:selected="${selectedGpu == 'Intel Iris'}">Card Onboard Intel</option>
                        <option value="Radeon" th:selected="${selectedGpu == 'Radeon'}">Card Onboard AMD Radeon</option>
                        <option value="Apple" th:selected="${selectedGpu == 'Apple'}">Apple GPU</option>
                    </select>
                </div>

                <button type="submit" class="btn-filter">Áp dụng bộ lọc</button>
            </form>
        </div>

        <!-- CỘT BÊN PHẢI: DANH SÁCH SẢN PHẨM -->
        <div th:if="${products == null or products.isEmpty()}" style="flex: 1; text-align: center; font-size: 1.2em; color: red;">
            <p th:text="'Không tìm thấy sản phẩm nào phù hợp với từ khóa \'' + ${keyword} + '\'.'">Không tìm thấy</p>
        </div>

        <div class="search-results-grid" th:if="${products != null and !products.isEmpty()}">
            <!-- Vòng lặp Thymeleaf in sản phẩm -->
            <div class="product_item" th:each="p : ${products}">
                <a th:href="@{/product_detail(id=${p.id})}" style="text-decoration: none; color: black;">
                    
                    <img class="product_img" th:src="@{'/' + ${p.image}}" th:alt="${p.name}">
                    
                    <div class="product_title" th:text="${p.name}">Tên SP</div>
                    <div class="product_price" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">Giá</div>
                    
                    <div class="more_infor_product" th:if="${p.productDetail != null}" th:text="'CPU: ' + ${p.productDetail.cpu} + ' / RAM: ' + ${p.productDetail.ram}">Cấu hình</div>
                    
                    <div class="product3_shopping">
                        <i class="fa fa-shopping-cart"></i>
                        <button class="button_comparation">So sánh</button>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Chèn Footer dùng chung -->
    <div th:replace="~{fragments/footer :: footer_lapzone}"></div>

</body>
</html>
