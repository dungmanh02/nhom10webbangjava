<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị - LAPZONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            background-color: #f0f2f5;
        }

        /* Sidebar - Không đổi */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            position: fixed;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            background-color: #1a252f;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .menu-item {
            padding: 15px 25px;
            display: block;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
        }
        .menu-item:hover {
            background-color: #34495e;
            color: white;
        }
        .menu-item i { margin-right: 10px; }

        /* Main Content - Không đổi */
        .main-content {
            margin-left: 250px;
            width: calc(100% - 250px);
            padding: 20px;
        }
        .top-bar {
            background: white;
            padding: 15px 30px;
            margin: -20px -20px 20px -20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .breadcrumb {
            color: #7f8c8d;
            font-weight: 500;
        }
        .admin-profile { color: #2c3e50; font-weight: 600; }
        
        /* Bảng chào mừng */
        .welcome-box {
            background: linear-gradient(135deg, #3498db, #8e44ad);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* STATS CONTAINER & CARDS - ĐÃ ĐỔI TÊN CLASS KHỚP HTML */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #3498db; /* Màu viền mặc định */
            position: relative; /* Để căn chỉnh icon tuyệt đối bên trong */
            overflow: hidden;
        }

        /* Đổi màu viền trái cho từng card cho sinh động */
        .stat-card:nth-child(2) { border-left-color: #2ecc71; } /* Xanh lá */
        .stat-card:nth-child(3) { border-left-color: #f1c40f; } /* Vàng */
        .stat-card:nth-child(4) { border-left-color: #e74c3c; } /* Đỏ */

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Thiết kế icon in chìm phía sau giống giao diện Admin chuyên nghiệp */
        .stat-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 45px;
            color: rgba(44, 62, 80, 0.1); /* Màu trong suốt */
        }
    </style>
</head>
<body>

   <div class="sidebar">
    <div class="sidebar-header">LAPZONE ADMIN</div>
    
    <a th:href="@{/admin/dashboard}" class="menu-item">
        <i class="fas fa-chart-line"></i> Tổng quan
    </a>
    
    <a th:href="@{/admin/products}" class="menu-item">
        <i class="fas fa-laptop"></i> Quản lý sản phẩm
    </a>
    
    <a th:href="@{/admin/users}" class="menu-item">
        <i class="fas fa-users-cog"></i> Quản lý khách hàng
    </a>
    
    <a th:href="@{/admin/orders}" class="menu-item">
        <i class="fas fa-boxes"></i> Quản lý Đơn hàng
    </a>

    <a th:href="@{/admin/invoices}" class="menu-item">
        <i class="fas fa-file-invoice-dollar"></i> Quản lý Hóa đơn
    </a>
    <a th:href="@{/admin/categories}" class="menu-item">
    <i class="fas fa-tags"></i> Quản lý Danh mục
    </a>
    <a th:href="@{/}" class="menu-item" style="margin-top: 50px; color: #e74c3c; border-top: 1px solid #3e4f5f; padding-top: 20px;">
        <i class="fas fa-sign-out-alt"></i> Thoát về trang chủ
    </a>
  </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="breadcrumb">Bảng điều khiển / Tổng quan</div>
            <div class="admin-profile">
                <i class="fas fa-user-shield"></i> Xin chào, 
                <span th:text="${session.currentUser != null ? session.currentUser.fullName : 'Quản trị viên'}"></span>
            </div>
        </div>

        <div class="welcome-box">
            <h1>CHÀO MỪNG ADMIN</h1>
            <p></p>
        </div>

       <div class="stat-card">
    <div class="stat-value" th:text="${countProducts}">0</div>
    <div class="stat-label">Tổng sản phẩm</div>
    <i class="fas fa-laptop stat-icon"></i>
</div>

<div class="stat-card">
    <div class="stat-value" th:text="${countUsers}">0</div>
    <div class="stat-label">Khách hàng</div>
    <i class="fas fa-users stat-icon"></i>
</div>
    </div>

</body>
</html>
