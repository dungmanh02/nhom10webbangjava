<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị - LAPZONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            background-color: #f0f2f5;
        }
        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            position: fixed;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            background-color: #1a252f;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .menu-item {
            padding: 15px 25px;
            display: block;
            color: #bdc3c7;
            text-decoration: none;
            transition: 0.3s;
        }
        .menu-item:hover {
            background-color: #34495e;
            color: white;
        }
        .menu-item i { margin-right: 10px; }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            width: calc(100% - 250px);
            padding: 20px;
        }
        .top-bar {
            background: white;
            padding: 15px 30px;
            margin: -20px -20px 20px -20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .admin-profile { color: #2c3e50; font-weight: 600; }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #3498db;
        }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 14px; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: #2c3e50; }

        .welcome-box {
            background: linear-gradient(135deg, #3498db, #8e44ad);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">LAPZONE ADMIN</div>
        <a href="#" class="menu-item"><i class="fas fa-home"></i> Tổng quan</a>
        <a href="#" class="menu-item"><i class="fas fa-laptop"></i> Quản lý sản phẩm</a>
        <a href="#" class="menu-item"><i class="fas fa-users"></i> Quản lý khách hàng</a>
        <a href="#" class="menu-item"><i class="fas fa-shopping-cart"></i> Đơn hàng</a>
        <a th:href="@{/}" class="menu-item" style="margin-top: 50px; color: #e74c3c;">
            <i class="fas fa-sign-out-alt"></i> Thoát về trang chủ
        </a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="breadcrumb">Bảng điều khiển / Tổng quan</div>
            <div class="admin-profile">
                <i class="fas fa-user-shield"></i> Xin chào, 
                <span th:text="${session.currentUser != null ? session.currentUser.fullName : 'Quản trị viên'}"></span>
            </div>
        </div>

        <div class="welcome-box">
            <h1>CHÀO MỪNG ADMIN</h1>
            <p>Hệ thống đang hoạt động ổn định. Bạn có 5 đơn hàng mới cần xử lý trong hôm nay.</p>
        </div>

        <div class="stats-container">
            <div class="card">
                <h3>TỔNG DOANH THU</h3>
                <p>150.000.000đ</p>
            </div>
            <div class="card" style="border-left-color: #2ecc71;">
                <h3>SẢN PHẨM ĐÃ BÁN</h3>
                <p>42</p>
            </div>
            <div class="card" style="border-left-color: #f1c40f;">
                <h3>KHÁCH HÀNG MỚI</h3>
                <p>12</p>
            </div>
        </div>
    </div>

</body>
</html>
