<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng | Lapzone Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .bg-pending { background: #fff3cd; color: #856404; } /* Chờ xác nhận */
        .bg-processing { background: #cce5ff; color: #004085; } /* Đang đóng gói */
        .bg-shipping { background: #d4edda; color: #155724; } /* Đang giao hàng */
        .bg-completed { background: #d1e7dd; color: #0f5132; } /* Hoàn thành */
        .bg-cancelled { background: #f8d7da; color: #721c24; } /* Đã hủy/Boom */
    </style>
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <div class="card shadow border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-bold text-primary"><i class="fas fa-boxes me-2"></i> QUẢN LÝ ĐƠN HÀNG</h4>
        </div>
        
        <div class="card-body">
            <form th:action="@{/admin/orders}" method="GET" class="row g-3 mb-4">
                <div class="col-md-4">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo Mã đơn, Tên, SĐT...">
                </div>
                <div class="col-md-3">
                    <select name="status" class="form-select">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="CHỜ XÁC NHẬN" th:selected="${status == 'CHỜ XÁC NHẬN'}">Chờ xác nhận</option>
                        <option value="ĐANG ĐÓNG GÓI" th:selected="${status == 'ĐANG ĐÓNG GÓI'}">Đang đóng gói</option>
                        <option value="ĐANG GIAO HÀNG" th:selected="${status == 'ĐANG GIAO HÀNG'}">Đang giao hàng</option>
                        <option value="HOÀN THÀNH" th:selected="${status == 'HOÀN THÀNH'}">Hoàn thành</option>
                        <option value="ĐÃ HỦY" th:selected="${status == 'ĐÃ HỦY'}">Đã hủy (Boom)</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="fas fa-filter me-2"></i> Lọc</button>
                </div>
            </form>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Mã đơn</th>
                            <th>Khách hàng</th>
                            <th>Ngày đặt</th>
                            <th>Tổng tiền</th>
                            <th>Thanh toán</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="fw-bold">#[[${order.id}]]</td>
                            <td>
                                <div class="fw-bold">[[${order.customerName}]]</div>
                                <small class="text-muted">[[${order.customerPhone}]]</small>
                            </td>
                            <td th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-danger fw-bold">[[${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')}]] ₫</td>
                            <td><span class="badge bg-secondary">[[${order.paymentMethod}]]</span></td>
                            <td>
                                <span th:class="'status-badge ' + 
                                    (${order.status == 'CHỜ XÁC NHẬN'} ? 'bg-pending' : 
                                    (${order.status == 'ĐANG ĐÓNG GÓI'} ? 'bg-processing' : 
                                    (${order.status == 'ĐANG GIAO HÀNG'} ? 'bg-shipping' : 
                                    (${order.status == 'HOÀN THÀNH'} ? 'bg-completed' : 'bg-cancelled'))))"
                                    th:text="${order.status}">
                                </span>
                            </td>
                            <td>
                                <form th:action="@{/admin/orders/update-status}" method="POST" class="d-flex gap-1">
                                    <input type="hidden" name="orderId" th:value="${order.id}">
                                    <select name="newStatus" class="form-select form-select-sm" style="width: 130px;">
                                        <option value="CHỜ XÁC NHẬN" th:selected="${order.status == 'CHỜ XÁC NHẬN'}">Xác nhận</option>
                                        <option value="ĐANG ĐÓNG GÓI" th:selected="${order.status == 'ĐANG ĐÓNG GÓI'}">Đóng gói</option>
                                        <option value="ĐANG GIAO HÀNG" th:selected="${order.status == 'ĐANG GIAO HÀNG'}">Giao hàng</option>
                                        <option value="HOÀN THÀNH" th:selected="${order.status == 'HOÀN THÀNH'}">Hoàn thành</option>
                                        <option value="ĐÃ HỦY" th:selected="${order.status == 'ĐÃ HỦY'}">Hủy đơn</option>
                                    </select>
                                    <button type="submit" class="btn btn-sm btn-success"><i class="fas fa-save"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
