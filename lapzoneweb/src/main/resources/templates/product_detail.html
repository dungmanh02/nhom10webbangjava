<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title th:text="${product.name}">Chi Tiết Sản Phẩm</title>
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: header_lapzone}"></div>

<main class="container">
    <div class="product-detail-layout">
        <!-- Left: Image Gallery -->
        <div class="product-gallery">
            <img id="mainImage" th:src="@{'/' + ${product.image}}" alt="Main Image" class="product-gallery-main">
            
            <div class="product-thumbnails" th:if="${product.images != null and !product.images.isEmpty()}">
                <!-- Add main image as first thumbnail -->
                <img class="product-thumb active" 
                     th:src="@{'/' + ${product.image}}" 
                     onclick="changeMainImage(this.src, this)">
                
                <!-- Additional thumbnails -->
                <img th:each="imgObj : ${product.images}" 
                     th:if="${!#strings.equals(imgObj.imageUrl, product.image)}"
                     class="product-thumb" 
                     th:src="@{'/' + ${imgObj.imageUrl}}" 
                     onclick="changeMainImage(this.src, this)">
            </div>
            
            <script>
                function changeMainImage(src, element) {
                    document.getElementById('mainImage').src = src;
                    document.querySelectorAll('.product-thumb').forEach(thumb => thumb.classList.remove('active'));
                    element.classList.add('active');
                }
            </script>
        </div>

        <!-- Right: Product Info & Actions -->
        <div class="product-info">
            <h1 th:text="${product.name}">Tên Sản Phẩm</h1>
            
            <div class="product-meta" style="font-size: 1rem; margin-bottom: 24px;">
                <span th:if="${product.productDetail != null}" th:text="${product.productDetail.conditionStatus != null ? product.productDetail.conditionStatus : 'Mới 100%'}">Tình trạng</span>
                <span style="color: var(--accent-neon);"><i class="fas fa-check-circle"></i> Bảo hành chính hãng</span>
                <span th:text="'Kho: ' + ${product.stock} + ' máy'">Số lượng</span>
            </div>

            <div class="product-price-large" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">Giá VND</div>

            <!-- Specs Summary -->
            <div class="product-specs-list" th:if="${product.productDetail != null}">
                <div class="spec-item">
                    <span class="spec-label"><i class="fas fa-microchip"></i> CPU</span>
                    <span class="spec-value" th:text="${product.productDetail.cpu}">Đang cập nhật</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label"><i class="fas fa-memory"></i> RAM</span>
                    <span class="spec-value" th:text="${product.productDetail.ram}">Đang cập nhật</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label"><i class="fas fa-hdd"></i> Ổ cứng</span>
                    <span class="spec-value" th:text="${product.productDetail.storage}">Đang cập nhật</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label"><i class="fas fa-desktop"></i> Màn hình</span>
                    <span class="spec-value" th:text="${product.productDetail.screen}">Đang cập nhật</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label"><i class="fas fa-gamepad"></i> VGA</span>
                    <span class="spec-value" th:text="${product.productDetail.gpu}">Đang cập nhật</span>
                </div>
                <div class="spec-item">
                    <span class="spec-label"><i class="fas fa-weight-hanging"></i> Trọng lượng</span>
                    <span class="spec-value" th:text="${product.productDetail.weight}">Đang cập nhật</span>
                </div>
            </div>

            <!-- Purchase Actions -->
            <div style="background: rgba(0,0,0,0.03); border: 1px solid var(--border-glass); padding: 24px; border-radius: var(--radius-lg);">
                <form id="addToCartForm" th:action="@{/cart/add}" method="post" class="add-to-cart-form">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    
                    <div class="qty-selector">
                        <label for="quantity" style="font-weight: 500;">Số lượng:</label>
                        <input type="number" id="quantity" name="quantity" value="1" min="1" th:max="${product.stock}">
                    </div>
                    
                    <button type="submit" class="btn-primary btn-buy-now">
                        <i class="fas fa-shopping-cart"></i> THÊM VÀO GIỎ HÀNG
                    </button>
                    
                    <button type="button" class="btn-danger btn-buy-now" onclick="handleBuyNow()" style="margin-top: -8px;">
                        MUA NGAY (Thanh toán an toàn)
                    </button>
                </form>

                <form id="buyNowForm" th:action="@{/buy-now}" method="POST" style="display: none;">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <input type="hidden" name="quantity" id="buyNowQty" value="1">
                </form>

                <script>
                    function handleBuyNow() {
                        const qty = document.getElementById('quantity').value;
                        document.getElementById('buyNowQty').value = qty;
                        document.getElementById('buyNowForm').submit();
                    }
                </script>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer_lapzone}"></div>

</body>
</html>
